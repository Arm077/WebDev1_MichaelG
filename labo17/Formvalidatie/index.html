<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Opdracht 2.10: Formvalidatie</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
<main>
    <h1>Formvalidatie</h1>
    <form id="validatieForm">
        <div class="form-group">
            <label for="voornaam">Voornaam:</label>
            <input type="text" id="voornaam">
            <span id="err-voornaam" class="error-text"></span>
        </div>

        <div class="form-group">
            <label for="familienaam">Familienaam:</label>
            <input type="text" id="familienaam">
            <span id="err-familienaam" class="error-text"></span>
        </div>

        <div class="form-group">
            <label for="geboortedatum">Geboortedatum (jjjj-mm-dd):</label>
            <input type="text" id="geboortedatum">
            <span id="err-geboortedatum" class="error-text"></span>
        </div>

        <div class="form-group">
            <label for="email">E-mailadres:</label>
            <input type="text" id="email">
            <span id="err-email" class="error-text"></span>
        </div>

        <div class="form-group">
            <label for="kinderen">Aantal kinderen:</label>
            <input type="text" id="kinderen">
            <span id="err-kinderen" class="error-text"></span>
        </div>

        <button type="button" id="btnValideer">Valideer</button>
    </form>
</main>
<script src="scripts/script.js"></script>
</body>
</html>
